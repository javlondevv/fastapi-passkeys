<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" role="img" aria-label="fastapi-passkeys">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e1b4b"/>
      <stop offset="0.55" stop-color="#312e81"/>
      <stop offset="1" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a5b4fc"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="320" rx="20" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <path d="M0 80 H1280 M0 160 H1280 M0 240 H1280"/>
    <path d="M320 0 V320 M640 0 V320 M960 0 V320"/>
  </g>

  <!-- passkey / fingerprint glyph -->
  <g transform="translate(120 160)" fill="none" stroke="url(#accent)" stroke-width="7" stroke-linecap="round">
    <circle cx="0" cy="0" r="70" stroke-opacity="0.25"/>
    <path d="M-40 14 a40 40 0 0 1 80 -6" stroke-opacity="0.9"/>
    <path d="M-26 22 a26 26 0 0 1 52 -2" stroke-opacity="0.75"/>
    <path d="M-12 30 a12 12 0 0 1 24 0" stroke-opacity="0.6"/>
    <circle cx="0" cy="-2" r="3" fill="url(#accent)" stroke="none"/>
    <!-- key -->
    <g transform="translate(34 -36)" stroke-opacity="0.95">
      <circle cx="0" cy="0" r="11"/>
      <path d="M9 7 L30 28 M24 22 L30 16 M30 28 L24 34"/>
    </g>
  </g>

  <text x="240" y="150" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="62" font-weight="800" fill="#ffffff">fastapi-passkeys</text>
  <text x="242" y="200" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="27" font-weight="500" fill="#c7d2fe">Passkeys / WebAuthn authentication for FastAPI</text>
  <text x="242" y="238" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="20" font-weight="400" fill="#a5b4fc" fill-opacity="0.9">secure by default · storage-agnostic · async-native</text>
</svg>
